name: "Smart Versioning Action"
description: "Auto versioning based on core-lib changes with fallback logic"

inputs:
  version-file:
    description: "Path to version.json (core-lib source of truth)"
    required: true

  env-files:
    description: "Comma-separated list of environment files to update"
    required: true

  additional-version-files:
    description: "Comma-separated list of additional version.json files to update"
    required: false

outputs:
  version:
    description: "Final calculated version"

runs:
  using: "node20"
  main: "index.js"

branding:
  icon: "git-branch"
  color: "blue"
